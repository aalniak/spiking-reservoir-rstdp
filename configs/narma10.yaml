# NARMA10 nonlinear auto-regressive prediction (temporal memory-capacity task).
# Amplitude-coded input -> analog current injection works better than event coding.
name: narma10
seed: 0
device: auto
output_dir: results

dataset:
  name: narma10
  order: 10
  train_len: 2500
  val_len: 600
  test_len: 1000
  washout: 100

encoder:
  name: identity        # analog current injection (preserves input amplitude)
  scale: 1.0

reservoir:
  kind: lif
  n_reservoir: 500
  connectivity: 0.1
  spectral_radius: 0.92
  input_scaling: 3.0
  input_connectivity: 1.0
  exc_ratio: 0.8
  leak: 0.92
  v_threshold: 0.6
  trace_decay: 0.9

hidden:
  size: 0

readout:
  trace_decays: [0.3, 0.7, 0.9, 0.97]   # NARMA needs ~10-step fading memory
  local_lr: 0.3
  local_epochs: 15

ridge:
  alphas: [1.0, 10.0, 100.0, 1000.0, 10000.0]

quantization:
  enabled: false
  bits: 8

training:
  gru_hidden: 32
  gru_epochs: 200
  gru_lr: 0.005
  rnn_kind: gru
